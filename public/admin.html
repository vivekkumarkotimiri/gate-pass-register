<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gate Pass Register — Admin</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>

<!-- ===================== LOGIN VIEW ===================== -->
<div id="loginView" class="login-wrap">
  <h2>Authorized Login</h2>
  
  <form id="loginForm">
    <label for="username">Username</label>
    <input type="text" id="username" required autocomplete="username" />
    <label for="password">Password</label>
    <input type="password" id="password" required autocomplete="current-password" />
    <div class="error-msg" id="loginError"></div>
    <button type="submit">Log in</button>
  </form>
  <p style="margin-top:16px;"><a href="index.html" style="font-size:13px;color:var(--ink-soft);">← Back to public register</a></p>
</div>

<!-- ===================== DASHBOARD VIEW ===================== -->
<div id="dashboardView" style="display:none;">

  <header class="topbar">
    <div class="brand">
      <img class="brand-logo" src="images/logo.png" alt="TGTRANSCO">
      <div class="brand-text">
        <h1>Gate Pass Register</h1>
        
      </div>
    </div>
    <div class="userbar">
      <span id="liveClock" class="live-clock"></span>
      <span id="whoAmI" class="whoAmI"></span>
      <button class="secondary" id="logoutBtn" type="button">Log out</button>
      <a href="index.html" style="font-size:13px;">Public view</a>
    </div>
  </header>

  <main>

    <!-- New entry form -->
    <section class="form-card">
      <h3>New gate pass entry</h3>
      <form id="createForm">
        <div class="form-grid">
          <div>
            <label for="c_date">Date</label>
            <input type="date" id="c_date" required />
          </div>
          <div>
            <label for="c_material">Material name</label>
            <input type="text" id="c_material" placeholder="e.g. Laptop Dell Inspiron" required />
          </div>
          <div>
             <label for="c_technician">Technician name</label>
             <input type="text" id="c_technician" placeholder="Enter Name"/>
          </div>
          <div>
            <label for="c_number">Contact No.</label>
            <input type="number" id="c_number" placeholder="Enter Number of 10 digits">
          </div>
          <div>
            <label for="c_type">Returnable / Non-Returnable</label>
            <select id="c_type" required>
              <option value="Returnable">Returnable</option>
              <option value="Non-Returnable">Non-Returnable</option>
            </select>
          </div>
          <div class="full">
            <label for="c_address">Address</label>
            <input type="text" id="c_address" placeholder="Destination address" required />
          </div>
          <div>
            <label for="c_purpose">Purpose</label>
            <select id="c_purpose" required>
              <option value="Repair">Repair</option>
              <option value="Replacement">Replacement</option>
              <option value="Damage">Damage</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div id="otherPurposeWrap" style="display:none;">
            <label for="c_purpose_other">Specify purpose</label>
            <input type="text" id="c_purpose_other" placeholder="Describe purpose" />
          </div>
        </div>
        <div class="form-actions">
          <button type="submit">Add entry</button>
          <span class="success-msg" id="createMsg"></span>
        </div>
      </form>
    </section>

    <!-- Existing entries -->
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search material, address or gate pass no…" style="min-width:260px;" />
      <select id="statusFilter">
        <option value="">All status</option>
        <option value="Open">Open</option>
        <option value="Closed">Closed</option>
      </select>
      <button class="secondary" id="refreshBtn" type="button">Refresh</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Gate Pass No.</th>
          <th>Date</th>
          <th>Material</th>
          <th>Technician Name</th>
          <th>Contact No.</th>
          <th>Returnable / Non-Returnable</th>
          <th>Address</th>
          <th>Purpose</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none;">No gate pass entries yet.</div>
  </main>
</div>

<!-- ===================== EDIT MODAL (simple inline panel) ===================== -->
<div id="editOverlay" style="display:none;position:fixed;inset:0;background:rgba(27,42,65,0.45);align-items:center;justify-content:center;">
  <div class="form-card" style="width:480px;max-width:92vw;background:var(--paper-raised);">
    <h3>Edit gate pass <span id="editGpNo" class="tag-no"></span></h3>
    <form id="editForm">
      <input type="hidden" id="e_id" />
      <div class="form-grid">
        <div>
          <label for="e_date">Date</label>
          <input type="date" id="e_date" required />
        </div>
        <div>
          <label for="e_material">Material name</label>
          <input type="text" id="e_material" required />
        </div>
        <div>
          <label for="e_technician">Technician name</label>
          <input type="text" id="e_technician" required />
        </div>
        <div>
          <label for="e_number">Contact No.</label>
          <input type="text" id="e_number" required />
        </div>
        <div>
          <label for="e_type">Returnable / Non-Returnable</label>
          <select id="e_type">
            <option value="Returnable">Returnable</option>
            <option value="Non-Returnable">Non-Returnable</option>
          </select>
        </div>
        <div>
          <label for="e_status">Status</label>
          <select id="e_status">
            <option value="Open">Open</option>
            <option value="Closed">Closed</option>
          </select>
        </div>
        <div class="full">
          <label for="e_address">Address</label>
          <input type="text" id="e_address" required />
        </div>
        <div class="full">
          <label for="e_purpose">Purpose</label>
          <input type="text" id="e_purpose" required />
        </div>
      </div>
      <div class="form-actions">
        <button type="submit">Save changes</button>
        <button type="button" class="secondary" id="cancelEditBtn">Cancel</button>
        <span class="error-msg" id="editError"></span>
      </div>
    </form>
  </div>
</div>
<script src="js/clock.js"></script>
<script src="js/admin.js"></script>
</body>
</html>

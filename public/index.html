<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gate Pass Register</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img class="brand-logo" src="images/logo.png" alt="TGTRANSCO">
    <div class="brand-text">
      <h1>Gate Pass Register</h1>

    </div>
  </div>
  <div>
    <nav style="display:flex;align-items:center;gap:18px;">
      <span id="liveClock" class="live-clock"></span>
      <a href="admin.html">Authorized person login →</a>
    </nav>
  </div>
</header>

<main>
  <div class="export-bar">
    <span>Export PDF</span>
    <label for="fromDate">From</label>
    <input type="date" id="fromDate" />
    <label for="toDate">To</label>
    <input type="date" id="toDate" />
    <button class="export-btn" type="button" onclick="exportToPDF()">⬇ Download PDF</button>
  </div>
  <div class="toolbar">
    
    <input type="text" id="searchInput" placeholder="Search material, address or gate pass no…" style="min-width:260px;" />
    <select id="statusFilter">
      <option value="">All status</option>
      <option value="Open">Open</option>
      <option value="Closed">Closed</option>
    </select>
    <select id="typeFilter">
      <option value="">All types</option>
      <option value="Returnable">Returnable</option>
      <option value="Non-Returnable">Non-Returnable</option>
    </select>
    <button class="secondary" id="refreshBtn" type="button">Refresh</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Gate Pass No.</th>
        <th>Date</th>
        <th>Material</th>
        <th>Type</th>
        <th>Technician Name</th>
        <th>Contact No.</th>
        <th>Address</th>
        <th>Purpose</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <!-- rows injected by public.js -->
    </tbody>
  </table>
  <div id="emptyState" class="empty-state" style="display:none;">No gate pass entries match your search.</div>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="js/export-pdf.js"></script>
<script src="js/clock.js"></script>
<script src="js/public.js"></script>
</body>
</html>
